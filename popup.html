<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Multi URL Opener</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="header-left">
                <img src="icons/icon48.svg" alt="">
                <label>Multi URL Opener by Mukesh</label>
            </div>
            <div class="header-right">
                <span id="counter">0</span>
                <button id="themeToggle">🌙</button>
            </div>
        </div>

        <div class="url-input-section">
            <!-- URL INPUT -->
            <div class="input-area">
                <div id="highlightLayer" class="textarea-highlight" aria-hidden="true"></div>
                <textarea id="urlInput" autofocus placeholder="Enter your multiple urls here..."></textarea>
                <button id="clearUrls">Clear All</button>
                <div class="feature-toggles">
                    <button id="toggleFindReplace" type="button">Find/Replace</button>
                    <button id="toggleGenerator" type="button">URL Generator</button>
                </div>
            </div>

            <!-- MAIN ACTIONS -->
            <div class="actions-container">
                <div class="actions">

                    <div class="open-options">
                        <button id="openAll" class="btn-primary">Open All</button>
                        <input type="number" id="repeatCount" value="1" min="1">
                    </div>

                    <select id="modeSelect">
                        <option value="group" selected>Group by Host (Default)</option>
                        <option value="tab">Open in Tabs</option>
                        <option value="window">Open in New Windows</option>
                    </select>

                    <button id="openOne" class="btn-secondary">One by One</button>
                </div>

                <!-- TOP ACTION BUTTONS -->
                <div class="top-actions">
                    <button id="extractBtn">Extract URLs</button>
                    <button id="importBtn">Import TXT</button>
                    <button id="exportBtn">Export TXT</button>
                    <button id="copyBtn">Copy All</button>
                    <button id="copyCleanBtn">Copy Cleaned</button>
                    <input type="file" id="fileInput" accept=".txt" hidden>
                </div>

                <div id="findReplaceSection" class="find-replace hidden-feature">
                    <input type="text" id="findText" placeholder="Find text">
                    <input type="text" id="replaceText" placeholder="Replace with">
                    <button id="replaceBtn">Find & Replace</button>
                </div>

                <div id="generatorSection" class="url-generator hidden-feature">
                    <input type="text" id="patternInput"
                        placeholder="Pattern URL (use {n} or existing number), e.g. https://abcd.com/files/ramu{n}.pdf">
                    <div class="generator-controls">
                        <input type="number" id="startNumber" value="1" step="1" placeholder="Start">
                        <input type="number" id="endNumber" value="10" step="1" placeholder="End">
                        <input type="number" id="stepNumber" value="1" min="1" step="1" placeholder="Step">
                        <select id="sequenceMode">
                            <option value="increment" selected>Increment</option>
                            <option value="decrement">Decrement</option>
                        </select>
                        <button id="generateBtn">Generate URLs</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- SETTINGS -->
        <div class="settings">

            <label>
                <input type="checkbox" id="remember">
                Remember URL List
            </label>

            <label>
                Delay between pages (seconds):
                <input type="number" id="delay" value="0" min="0">
            </label>

            <label>
                One by One Max Wait (seconds):
                <input type="number" id="maxWait" value="2" min="1">
            </label>

            <label>
                Open only first
                <input type="number" id="limit" value="0" min="0">
                URL's
            </label>

            <div class="bottom-actions">
                <button id="cleanup">Cleanup</button>
                <button id="restore">Restore Defaults</button>
            </div>
        </div>

        <!-- STATUS -->
        <div id="status"></div>

    </div>


    <!-- 🔥 REUSABLE PROFESSIONAL MODAL -->
    <div id="appModal" class="modal-overlay hidden">
        <div class="modal-box">

            <div class="modal-header">
                <div class="modal-icon" id="modalIcon">⚠️</div>
                <h3 id="modalTitle">Title</h3>
            </div>

            <div class="modal-body">
                <p id="modalMessage">
                    Message goes here
                </p>
            </div>

            <div class="modal-actions">
                <button id="modalConfirm" class="btn-primary">OK</button>
                <button id="modalCancel" class="btn-secondary">Cancel</button>
            </div>

        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
